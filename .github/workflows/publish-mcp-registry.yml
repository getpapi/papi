name: Publish to MCP Registry

# Publishes server.json to registry.modelcontextprotocol.io.
#
# Uses GitHub Actions OIDC to authenticate. OIDC proves this workflow runs in
# the getpapi org, which is what grants the io.github.getpapi/* namespace —
# so this sidesteps the OAuth-app/device-flow namespace problem entirely.
#
# This repo is public, so Actions minutes are free and unlimited.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - server.json

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/').tar.gz" \
            | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish
